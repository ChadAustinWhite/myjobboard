name: Deploy to GitHub Pages

# Publishes `dist/` to the `gh-pages` branch. In the repo settings, choose
# Pages → Build from branch → `gh-pages` / `/ (root)` once (GitHub does not
# turn this on automatically).

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-branch
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install and build
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          # Optional: Cloudflare Worker base URL wiring Indeed Publisher search (see workers/indeed-proxy/).
          VITE_INDEED_PROXY_URL: ${{ secrets.VITE_INDEED_PROXY_URL }}
        run: |
          npm ci
          npx tsc --noEmit
          REPO="${GITHUB_REPOSITORY#*/}"
          npx vite build --base="/${REPO}/"
          cp dist/index.html dist/404.html

      - name: Push to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
          force_orphan: true
